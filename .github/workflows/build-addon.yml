name: Build Minecraft Addon

on:
  push:
    branches:
      - main
      - master
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Package Pa Van's Portal Backpack
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build mcaddon
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          foreach ($pack in @("BP", "RP")) {
            $manifest = Join-Path $pack "manifest.json"
            if (-not (Test-Path $manifest)) {
              throw "Missing $manifest"
            }
          }

          $bpManifest = Get-Content "BP/manifest.json" -Raw | ConvertFrom-Json
          $version = $bpManifest.header.version -join "."
          $outputName = "PaVansPortalBackpack_$version.mcaddon"

          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Remove-Item "dist/*.mcaddon" -Force -ErrorAction SilentlyContinue
          $outputPath = Join-Path "dist" $outputName
          $zipPath = Join-Path "dist" "addon.zip"

          Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path "BP", "RP" -DestinationPath $zipPath -CompressionLevel Optimal
          Move-Item -Path $zipPath -Destination $outputPath -Force
          Get-Item $outputPath

      - name: Upload addon
        uses: actions/upload-artifact@v4
        with:
          name: PaVansPortalBackpack
          path: dist/*.mcaddon
          if-no-files-found: error

  release:
    name: Attach addon to release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download addon
        uses: actions/download-artifact@v4
        with:
          name: PaVansPortalBackpack
          path: dist

      - name: Attach addon to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/*.mcaddon --clobber --repo "${{ github.repository }}"
